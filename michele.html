<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolo de Mi · Painel Michele</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FDF4FB;
  --surface: #FFFFFF;
  --border: #EDD6E8;
  --pink: #D9368A;
  --pink-light: #FDEAF5;
  --purple: #5A2D8C;
  --purple-light: #EEE4F8;
  --muted: #9B7AAA;
  --green: #1F7A4F;
  --green-bg: #E4F5EC;
  --text: #240F40;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* HEADER */
.header {
  background: var(--purple);
  padding: 0 28px;
  height: 66px;
  display: flex; align-items: center; gap: 14px;
  position: sticky; top:0; z-index:100;
  box-shadow: 0 4px 24px rgba(90,45,140,0.3);
}
.logo-mark {
  width: 42px; height: 42px;
  background: var(--pink);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}
.logo-text { font-family:'Fraunces',serif; font-size:1.25rem; color:#fff; line-height:1; }
.logo-text em { color:#F9A8D4; font-style:italic; }
.logo-sub { font-size:0.7rem; color:rgba(255,255,255,0.55); margin-top:2px; font-weight:600; letter-spacing:0.04em; }
.header-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
.today-date { font-size:0.8rem; color:rgba(255,255,255,0.5); }
.btn-share {
  background:var(--pink); color:#fff; border:none;
  padding:10px 18px; border-radius:10px;
  font-family:'Plus Jakarta Sans',sans-serif; font-size:0.85rem; font-weight:700;
  cursor:pointer; display:flex; align-items:center; gap:6px;
  box-shadow:0 2px 10px rgba(217,54,138,0.4);
  transition:all 0.2s;
}
.btn-share:hover { background:#c0277a; transform:translateY(-1px); }

/* MAIN */
.main { max-width:980px; margin:0 auto; padding:28px 20px 60px; }

/* SUMMARY */
.summary-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
.sum-card {
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:14px; padding:18px 16px; text-align:center;
}
.sum-icon { font-size:1.5rem; margin-bottom:8px; }
.sum-val {
  font-family:'Fraunces',serif; font-size:1.8rem; font-weight:900;
  color:var(--purple); line-height:1; letter-spacing:-0.02em;
}
.sum-val.green { color:var(--green); }
.sum-val.pink { color:var(--pink); }
.sum-label { font-size:0.67rem; color:var(--muted); font-weight:700; margin-top:5px; text-transform:uppercase; letter-spacing:0.06em; }

/* FILTER */
.filter-card {
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:14px; padding:18px 20px; margin-bottom:22px;
  display:flex; gap:14px; align-items:flex-end; flex-wrap:wrap;
}
.filter-field { flex:1; min-width:150px; }
.filter-label { font-size:0.7rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; display:block; }
input[type="date"], input[type="text"] {
  width:100%; padding:10px 12px;
  border:1.5px solid var(--border); border-radius:9px;
  font-family:'Plus Jakarta Sans',sans-serif; font-size:0.9rem; color:var(--text);
  background:var(--bg); outline:none; transition:border-color 0.2s;
}
input:focus { border-color:var(--purple); background:#fff; }
.btn-filter {
  padding:10px 22px; background:var(--purple); color:#fff; border:none;
  border-radius:9px; font-family:'Plus Jakarta Sans',sans-serif;
  font-size:0.9rem; font-weight:700; cursor:pointer; white-space:nowrap;
  transition:all 0.2s;
}
.btn-filter:hover { background:#4a2278; }

/* MOTOBOY CARD */
.mb-card {
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:16px; margin-bottom:22px; overflow:hidden;
  box-shadow:0 2px 16px rgba(90,45,140,0.08);
}
.mb-header {
  padding:18px 22px; display:flex; align-items:center; gap:14px;
  background:linear-gradient(135deg, var(--purple-light) 0%, var(--pink-light) 100%);
  border-bottom:1.5px solid var(--border);
}
.mb-avatar {
  width:48px; height:48px;
  background:linear-gradient(135deg, var(--purple), var(--pink));
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-family:'Fraunces',serif; font-size:1.3rem; color:#fff; font-weight:900; flex-shrink:0;
}
.mb-info { flex:1; }
.mb-name { font-family:'Fraunces',serif; font-size:1.15rem; font-weight:700; color:var(--purple); }
.mb-meta { font-size:0.78rem; color:var(--muted); margin-top:3px; font-weight:500; }
.status-badge {
  font-size:0.68rem; padding:3px 10px; border-radius:20px; font-weight:700; margin-left:6px;
}
.status-open { background:#FFF3CD; color:#856404; }
.status-closed { background:var(--green-bg); color:var(--green); }

/* PIX BOX */
.pix-box {
  background:var(--green); border-radius:12px;
  padding:12px 22px; text-align:center; min-width:140px;
}
.pix-lbl { font-size:0.67rem; color:rgba(255,255,255,0.75); font-weight:700; text-transform:uppercase; letter-spacing:0.06em; }
.pix-amt {
  font-family:'Fraunces',serif; font-size:1.7rem; font-weight:900;
  color:#fff; line-height:1.1; letter-spacing:-0.02em;
}
.pix-sub { font-size:0.67rem; color:rgba(255,255,255,0.6); margin-top:2px; }

/* ORDERS TABLE */
.orders-wrap {}
.orders-table { width:100%; border-collapse:collapse; }
.orders-table thead tr { background:#FAFAFE; }
.orders-table th {
  padding:10px 22px; text-align:left;
  font-size:0.67rem; font-weight:700; color:var(--muted);
  text-transform:uppercase; letter-spacing:0.06em;
  border-bottom:1px solid var(--border);
}
.orders-table th.r { text-align:right; }
.orders-table td {
  padding:14px 22px; font-size:0.88rem;
  border-bottom:1px solid var(--border); vertical-align:middle;
}
.orders-table tbody tr:last-child td { border-bottom:none; }
.orders-table tbody tr:hover td { background:#FDFAFF; }

.td-code { font-family:'Fraunces',serif; font-size:1.05rem; font-weight:900; color:var(--purple); }
.plat-badge { font-size:0.67rem; padding:3px 10px; border-radius:20px; font-weight:700; display:inline-block; }
.plat-ifood { background:#fee; color:#c0392b; }
.plat-99 { background:#fef9e7; color:#b7860a; }
.plat-particular { background:var(--green-bg); color:var(--green); }
.td-addr { color:#555; max-width:280px; font-size:0.85rem; }
.td-km { font-family:'Fraunces',serif; font-weight:700; color:var(--muted); font-size:1rem; white-space:nowrap; }
.td-price { font-family:'Fraunces',serif; font-weight:900; color:var(--green); font-size:1.1rem; text-align:right; white-space:nowrap; }

/* FOOTER */
.mb-footer {
  background:linear-gradient(135deg, #F5EEFF 0%, #FEF0FA 100%);
  border-top:1.5px solid var(--border);
  padding:16px 22px;
  display:flex; gap:0; align-items:stretch;
}
.footer-col { flex:1; text-align:center; padding:0 14px; border-right:1px solid var(--border); }
.footer-col:last-child { border-right:none; }
.fc-lbl { font-size:0.67rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:4px; }
.fc-val { font-family:'Fraunces',serif; font-size:1.1rem; font-weight:900; color:var(--purple); letter-spacing:-0.01em; }
.fc-val.big { font-size:1.5rem; color:var(--green); }

/* EMPTY / LOADING */
.empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
.empty-icon { font-size:3rem; margin-bottom:12px; }
.loading { display:flex; justify-content:center; padding:50px; }
.spinner {
  width:36px; height:36px;
  border:3px solid var(--border); border-top-color:var(--purple);
  border-radius:50%; animation:spin 0.7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* MODAL */
.modal-overlay {
  position:fixed; inset:0; background:rgba(42,16,64,0.55);
  display:flex; align-items:center; justify-content:center; z-index:1000; padding:20px;
}
.modal {
  background:#fff; border-radius:18px; padding:28px;
  max-width:460px; width:100%;
  box-shadow:0 20px 60px rgba(90,45,140,0.25);
}
.modal-title { font-family:'Fraunces',serif; font-size:1.2rem; color:var(--purple); margin-bottom:6px; }
.modal-sub { font-size:0.83rem; color:var(--muted); margin-bottom:20px; }
.link-box {
  background:var(--bg); border:1.5px solid var(--border); border-radius:10px;
  padding:12px 14px; font-size:0.82rem; color:var(--purple);
  word-break:break-all; margin-bottom:14px; font-family:monospace;
}
.modal-actions { display:flex; gap:10px; }
.btn-copy { flex:1; padding:11px; background:var(--purple); color:#fff; border:none; border-radius:10px; font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:0.9rem; cursor:pointer; }
.btn-whats { flex:1; padding:11px; background:#25D366; color:#fff; border:none; border-radius:10px; font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:0.9rem; cursor:pointer; }
.btn-close-modal { padding:11px 16px; background:var(--bg); color:var(--muted); border:1px solid var(--border); border-radius:10px; font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:0.9rem; cursor:pointer; }

.hidden { display:none !important; }

@media(max-width:640px) {
  .summary-grid { grid-template-columns:1fr 1fr; }
  .filter-card { flex-direction:column; }
  .orders-table th:nth-child(3), .orders-table td:nth-child(3) { display:none; }
  .header { padding:0 16px; }
  .btn-share span { display:none; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo-mark">🎂</div>
  <div>
    <div class="logo-text">Bolo de <em>Mi</em></div>
    <div class="logo-sub">Painel da Michele</div>
  </div>
  <div class="header-right">
    <span class="today-date" id="today-label"></span>
    <button class="btn-share" onclick="abrirModal()">📱 <span>Enviar Link ao Motoboy</span></button>
  </div>
</div>

<div class="main">
  <div class="summary-grid">
    <div class="sum-card"><div class="sum-icon">🛵</div><div class="sum-val pink" id="sum-motoboys">0</div><div class="sum-label">Motoboys</div></div>
    <div class="sum-card"><div class="sum-icon">📦</div><div class="sum-val" id="sum-pedidos">0</div><div class="sum-label">Pedidos</div></div>
    <div class="sum-card"><div class="sum-icon">📍</div><div class="sum-val" id="sum-km">0 km</div><div class="sum-label">KM Total</div></div>
    <div class="sum-card"><div class="sum-icon">💰</div><div class="sum-val green" id="sum-total">R$ 0</div><div class="sum-label">Total Pagar</div></div>
  </div>

  <div class="filter-card">
    <div class="filter-field"><label class="filter-label">Data</label><input type="date" id="filtro-data"></div>
    <div class="filter-field"><label class="filter-label">Motoboy</label><input type="text" id="filtro-nome" placeholder="Buscar por nome..."></div>
    <button class="btn-filter" onclick="carregar()">🔍 Filtrar</button>
  </div>

  <div id="content"><div class="loading"><div class="spinner"></div></div></div>
</div>

<div class="modal-overlay hidden" id="modal">
  <div class="modal">
    <div class="modal-title">📱 Link para o Motoboy</div>
    <div class="modal-sub">Envie pelo WhatsApp. O motoboy abre no celular e registra os pedidos do dia.</div>
    <div class="link-box" id="link-box"></div>
    <div class="modal-actions">
      <button class="btn-copy" onclick="copiarLink()">📋 Copiar</button>
      <button class="btn-whats" onclick="enviarWhatsapp()">💬 WhatsApp</button>
      <button class="btn-close-modal" onclick="fecharModal()">Fechar</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD9JGS6HMTWuj17fne5hOAZ2TOh9o8tyhw",
  authDomain: "bolo-de-mi.firebaseapp.com",
  projectId: "bolo-de-mi",
  storageBucket: "bolo-de-mi.firebasestorage.app",
  messagingSenderId: "1060789628321",
  appId: "1:1060789628321:web:fe5a8beb4a305de9772fe0"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const hoje = new Date().toISOString().split('T')[0];
document.getElementById('filtro-data').value = hoje;
document.getElementById('today-label').textContent = new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});

function fmtR(v){ return 'R$ '+Number(v).toFixed(2).replace('.',','); }
const platClass = {iFood:'plat-ifood','99':'plat-99',Particular:'plat-particular'};

window.carregar = async () => {
  const data = document.getElementById('filtro-data').value || hoje;
  const filtroNome = document.getElementById('filtro-nome').value.toLowerCase().trim();
  const cont = document.getElementById('content');
  cont.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const snapPed = await getDocs(query(collection(db,'pedidos'),where('data','==',data)));
    const snapFech = await getDocs(query(collection(db,'fechamentos'),where('data','==',data)));
    const fechamentos = {};
    snapFech.forEach(d => { fechamentos[d.data().motoboyId] = d.data(); });
    const grupos = {};
    snapPed.forEach(d => {
      const p = d.data();
      if(filtroNome && !p.motoboyNome.toLowerCase().includes(filtroNome)) return;
      if(!grupos[p.motoboyId]) grupos[p.motoboyId] = {nome:p.motoboyNome, pedidos:[]};
      grupos[p.motoboyId].pedidos.push(p);
    });
    Object.values(grupos).forEach(g => g.pedidos.sort((a,b)=>a.timestamp-b.timestamp));
    const ids = Object.keys(grupos);
    if(ids.length===0){
      cont.innerHTML=`<div class="empty-state"><div class="empty-icon">📊</div><div>Nenhum registro para ${data}.</div></div>`;
      atualizarSummary(0,0,0,0); return;
    }
    let tMb=ids.length,tPed=0,tKm=0,tGeral=0;
    ids.forEach(id=>{
      const g=grupos[id]; tPed+=g.pedidos.length;
      g.pedidos.forEach(p=>{ tKm+=Number(p.km)||0; });
      const f=fechamentos[id];
      tGeral+=f?f.total:g.pedidos.reduce((s,p)=>s+p.valor,0);
    });
    atualizarSummary(tMb,tPed,tKm.toFixed(1),tGeral);
    cont.innerHTML = ids.map(id=>{
      const g=grupos[id], fech=fechamentos[id];
      const totalCorridas=g.pedidos.reduce((s,p)=>s+p.valor,0);
      const diaria=fech?fech.diaria:0;
      const total=fech?fech.total:totalCorridas;
      return `
        <div class="mb-card">
          <div class="mb-header">
            <div class="mb-avatar">${g.nome.charAt(0).toUpperCase()}</div>
            <div class="mb-info">
              <div class="mb-name">🛵 ${g.nome}</div>
              <div class="mb-meta">${g.pedidos.length} pedido(s) · ${data}
                <span class="status-badge ${fech?'status-closed':'status-open'}">${fech?'✅ Fechado':'⏳ Em aberto'}</span>
              </div>
            </div>
            <div class="pix-box">
              <div class="pix-lbl">💚 PIX</div>
              <div class="pix-amt">${fmtR(total)}</div>
              <div class="pix-sub">${g.pedidos.length} entrega(s)</div>
            </div>
          </div>
          <div class="orders-wrap">
            <table class="orders-table">
              <thead><tr><th>Pedido</th><th>Plataforma</th><th>Endereço de Entrega</th><th>KM</th><th class="r">Valor</th></tr></thead>
              <tbody>
                ${g.pedidos.map(p=>`
                  <tr>
                    <td class="td-code">#${p.codigo}</td>
                    <td><span class="plat-badge ${platClass[p.plataforma]||''}">${p.plataforma}</span></td>
                    <td class="td-addr">${p.endereco}</td>
                    <td class="td-km">${p.km} km</td>
                    <td class="td-price">${fmtR(p.valor)}</td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>
          <div class="mb-footer">
            <div class="footer-col"><div class="fc-lbl">Corridas</div><div class="fc-val">${fmtR(totalCorridas)}</div></div>
            <div class="footer-col"><div class="fc-lbl">Diária Fixa</div><div class="fc-val">${fmtR(diaria)}</div></div>
            <div class="footer-col"><div class="fc-lbl">Qtd Pedidos</div><div class="fc-val">${g.pedidos.length}</div></div>
            <div class="footer-col"><div class="fc-lbl">Total via PIX</div><div class="fc-val big">${fmtR(total)}</div></div>
          </div>
        </div>`;
    }).join('');
  } catch(e){ cont.innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><div>Erro ao carregar.</div></div>`; console.error(e); }
};

function atualizarSummary(mb,ped,km,total){
  document.getElementById('sum-motoboys').textContent=mb;
  document.getElementById('sum-pedidos').textContent=ped;
  document.getElementById('sum-km').textContent=km+' km';
  document.getElementById('sum-total').textContent='R$ '+Number(total).toFixed(2).replace('.',',');
}

window.abrirModal = () => {
  const url = window.location.href.replace('michele.html','')+'motoboy.html';
  document.getElementById('link-box').textContent=url;
  document.getElementById('modal').classList.remove('hidden');
};
window.fecharModal = () => document.getElementById('modal').classList.add('hidden');
window.copiarLink = () => navigator.clipboard.writeText(document.getElementById('link-box').textContent).then(()=>alert('✅ Link copiado!'));
window.enviarWhatsapp = () => window.open('https://wa.me/?text='+encodeURIComponent('Olá! Link para registrar suas entregas hoje:\n'+document.getElementById('link-box').textContent),'_blank');

carregar();
</script>
</body>
</html>
