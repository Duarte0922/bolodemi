<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolo de Mi · Registro de Entregas</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FDF4FB;
  --surface: #FFFFFF;
  --border: #EDD6E8;
  --pink: #D9368A;
  --pink-light: #FDEAF5;
  --purple: #5A2D8C;
  --purple-light: #EEE4F8;
  --muted: #9B7AAA;
  --green: #1F7A4F;
  --green-bg: #E4F5EC;
  --text: #240F40;
  --red: #C0392B;
  --red-bg: #FEE2E2;
  --blue: #2563eb;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
}

.header {
  background: linear-gradient(135deg, var(--purple), #7c3aed);
  padding: 0 20px;
  height: 62px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(90, 45, 140, 0.3);
}

.logo-mark {
  width: 40px;
  height: 40px;
  background: var(--pink);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
}

.logo-text {
  font-family: 'Fraunces', serif;
  font-size: 1.15rem;
  color: #fff;
  line-height: 1;
}

.logo-text em {
  color: #F9A8D4;
  font-style: italic;
}

.logo-sub {
  font-size: 0.7rem;
  color: rgba(255, 255, 255, 0.6);
  margin-top: 2px;
  font-weight: 600;
}

.main {
  max-width: 600px;
  margin: 0 auto;
  padding: 20px;
}

.welcome-card {
  background: linear-gradient(135deg, var(--purple-light), var(--pink-light));
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
  text-align: center;
}

.welcome-icon {
  font-size: 2.5rem;
  margin-bottom: 8px;
}

.welcome-title {
  font-family: 'Fraunces', serif;
  font-size: 1.3rem;
  color: var(--purple);
  margin-bottom: 4px;
}

.welcome-sub {
  font-size: 0.85rem;
  color: var(--muted);
}

.date-selector {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 20px;
  display: flex;
  gap: 10px;
  align-items: center;
}

.date-selector label {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--muted);
}

.date-selector input {
  flex: 1;
  padding: 10px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 0.9rem;
}

.form-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
}

.form-title {
  font-family: 'Fraunces', serif;
  font-size: 1.1rem;
  color: var(--purple);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.form-group {
  margin-bottom: 16px;
}

.form-label {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 6px;
  display: block;
}

.form-hint {
  font-size: 0.75rem;
  color: var(--blue);
  margin-top: 4px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 4px;
}

.form-input,
.form-select {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.95rem;
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border-color 0.2s;
}

.form-input:focus,
.form-select:focus {
  border-color: var(--purple);
  background: #fff;
}

.btn-primary {
  width: 100%;
  padding: 14px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s;
}

.btn-primary:hover {
  background: #186040;
  transform: translateY(-1px);
}

.btn-secondary {
  width: 100%;
  padding: 14px;
  background: #f59e0b;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s;
}

.btn-secondary:hover {
  background: #d97706;
  transform: translateY(-1px);
}

.pedidos-list {
  margin-top: 20px;
}

.pedido-item {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.pedido-info {
  flex: 1;
}

.pedido-codigo {
  font-family: 'Fraunces', serif;
  font-size: 1.1rem;
  font-weight: 900;
  color: var(--purple);
  margin-bottom: 4px;
}

.pedido-meta {
  font-size: 0.8rem;
  color: var(--muted);
}

.pedido-valor {
  font-family: 'Fraunces', serif;
  font-size: 1.2rem;
  font-weight: 900;
  color: var(--green);
  text-align: right;
}

.pedido-valor.negativo {
  color: var(--red);
}

.btn-del{background:none;border:none;cursor:pointer;font-size:1.1rem;padding:4px 6px;border-radius:6px;color:#c0392b;opacity:0.5;transition:all 0.15s;}
.btn-del:hover{background:#fee2e2;opacity:1;}
.acoes-hoje{display:flex;gap:10px;margin-top:16px;}
.btn-acao{flex:1;padding:13px;border:none;border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.9rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all 0.2s;}
.btn-acao-pdf{background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;}
.btn-acao-pdf:hover{background:#a93226;transform:translateY(-1px);}
.btn-acao-wpp{background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;}
.btn-acao-wpp:hover{background:#1aab55;transform:translateY(-1px);}

.total-card {
  background: linear-gradient(135deg, var(--green), #2d9d64);
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  color: #fff;
  margin-top: 20px;
}

.total-label {
  font-size: 0.85rem;
  opacity: 0.9;
  margin-bottom: 6px;
}

.total-valor {
  font-family: 'Fraunces', serif;
  font-size: 2.5rem;
  font-weight: 900;
}

.hidden {
  display: none !important;
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(42, 16, 64, 0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
}

.modal-login {
  background: #fff;
  border-radius: 18px;
  padding: 30px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(90, 45, 140, 0.3);
}

.modal-login-title {
  font-family: 'Fraunces', serif;
  font-size: 1.4rem;
  color: var(--purple);
  text-align: center;
  margin-bottom: 8px;
}

.modal-login-sub {
  font-size: 0.9rem;
  color: var(--muted);
  text-align: center;
  margin-bottom: 24px;
}

.btn-login {
  width: 100%;
  padding: 14px;
  background: var(--purple);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
  margin-top: 20px;
}

.diaria-auto-info {
  background: #eff6ff;
  border: 1.5px solid #3b82f6;
  border-radius: 10px;
  padding: 12px;
  margin-top: 12px;
  font-size: 0.85rem;
  color: #1e40af;
  text-align: center;
  font-weight: 600;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo-mark">🎂</div>
  <div>
    <div class="logo-text">Bolo de <em>Mi</em></div>
    <div class="logo-sub">Registro de Entregas</div>
  </div>
</div>

<div class="modal-overlay" id="modal-login">
  <div class="modal-login">
    <div class="modal-login-title">🛵 Identifique-se</div>
    <div class="modal-login-sub">Informe seus dados para continuar</div>
    <div class="form-group">
      <label class="form-label">Nome Completo</label>
      <input type="text" id="login-nome" class="form-input" placeholder="Seu nome">
    </div>
    <div class="form-group">
      <label class="form-label">Telefone</label>
      <input type="tel" id="login-tel" class="form-input" placeholder="(31) 99999-9999">
    </div>
    <button class="btn-login" onclick="fazerLogin()">✅ Entrar</button>
  </div>
</div>

<div class="main">
  <div class="welcome-card">
    <div class="welcome-icon">🛵</div>
    <div class="welcome-title">Olá, <span id="nome-motoboy">Motoboy</span>!</div>
    <div class="welcome-sub">Registre suas entregas</div>
  </div>

  <div class="date-selector">
    <label>📅 Data:</label>
    <input type="date" id="data-selecionada" onchange="carregarPedidosDaData()">
  </div>

  <div class="form-card">
    <div class="form-title">📋 Adicionar Pedido</div>
    <div class="form-group">
      <label class="form-label">Código do Pedido</label>
      <input type="text" id="codigo" class="form-input" placeholder="Ex: 1234">
    </div>
    <div class="form-group">
      <label class="form-label">Plataforma</label>
      <select id="plataforma" class="form-select">
        <option value="">Selecione...</option>
        <option value="iFood">iFood</option>
        <option value="99">99Food</option>
        <option value="Particular">Particular</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Endereço de Entrega</label>
      <input type="text" id="endereco" class="form-input" placeholder="Rua, número, bairro">
    </div>
    <div class="form-group">
      <label class="form-label">KM Rodados</label>
      <input type="number" id="km" class="form-input" placeholder="0.0" step="0.1" oninput="calcularValor()">
    </div>
    <div class="form-group">
      <label class="form-label">Valor da Corrida (R$)</label>
      <input type="number" id="valor" class="form-input" placeholder="0.00" step="0.01" readonly style="background: #f0f0f0;">
    </div>
    <button class="btn-primary" onclick="adicionarPedido()">➕ Adicionar Pedido</button>
  </div>

  <div class="form-card">
    <div class="form-title">💵 Diária do Dia</div>
    <div id="diaria-info-auto" class="diaria-auto-info"></div>
    <div class="form-group">
      <label class="form-label">Valor da Diária (R$) - Opcional</label>
      <input type="number" id="diaria-valor" class="form-input" placeholder="Deixe vazio para usar automático" step="0.01">
      <div class="form-hint">
        <span>💡 Se deixar vazio, usa o valor automático acima</span>
      </div>
    </div>
    <button class="btn-primary" onclick="adicionarDiaria()">➕ Adicionar Diária</button>
  </div>

  <div class="form-card">
    <div class="form-title">💰 Adiantamento / Compra</div>
    <div class="form-group">
      <label class="form-label">Valor (R$)</label>
      <input type="number" id="adiant-valor" class="form-input" placeholder="0.00" step="0.01">
    </div>
    <div class="form-group">
      <label class="form-label">Descrição</label>
      <input type="text" id="adiant-desc" class="form-input" placeholder="Ex: Gasolina, Almoço">
    </div>
    <button class="btn-secondary" onclick="adicionarAdiantamento()">➕ Adicionar</button>
  </div>

  <div class="form-card">
    <div class="form-title">📦 Pedidos do Dia</div>
    <div id="pedidos-list" class="pedidos-list"></div>
    <div id="empty-state" style="text-align: center; color: var(--muted); padding: 20px;">
      Nenhum pedido nesta data
    </div>
  </div>

  <div class="total-card hidden" id="total-card">
    <div class="total-label">💰 Total</div>
    <div class="total-valor" id="total-valor">R$ 0,00</div>
  </div>

  <div class="acoes-hoje hidden" id="acoes-hoje">
    <button class="btn-acao btn-acao-pdf" onclick="gerarPDFHoje()">📄 Salvar PDF</button>
    <button class="btn-acao btn-acao-wpp" onclick="enviarWhatsAppHoje()">📲 Enviar WhatsApp</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD9JGS6HMTWuj17fne5hOAZ2TOh9o8tyhw",
  authDomain: "bolo-de-mi.firebaseapp.com",
  projectId: "bolo-de-mi",
  storageBucket: "bolo-de-mi.firebasestorage.app",
  messagingSenderId: "1060789628321",
  appId: "1:1060789628321:web:fe5a8beb4a305de9772fe0"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let pedidos = [];
let motoboyInfo = null;
let dataAtual = new Date().toLocaleDateString('en-CA');

const tabelaPrecos = [
  { ate: 3, valor: 3 },
  { ate: 7, valor: 5 },
  { ate: 9, valor: 7 },
  { ate: 14, valor: 11 },
  { ate: 18, valor: 18 },
  { ate: 999, valor: 20 }
];

const feriadosNacionais = {
  '2025-01-01': 'Ano Novo', '2025-03-04': 'Carnaval', '2025-04-18': 'Sexta-feira Santa',
  '2025-04-21': 'Tiradentes', '2025-05-01': 'Dia do Trabalho', '2025-06-19': 'Corpus Christi',
  '2025-09-07': 'Independência', '2025-10-12': 'N. Sra. Aparecida', '2025-11-02': 'Finados',
  '2025-11-15': 'Proclamação da República', '2025-11-20': 'Consciência Negra', '2025-12-25': 'Natal',
  '2026-01-01': 'Ano Novo', '2026-02-17': 'Carnaval', '2026-04-03': 'Sexta-feira Santa',
  '2026-04-21': 'Tiradentes', '2026-05-01': 'Dia do Trabalho', '2026-06-04': 'Corpus Christi',
  '2026-09-07': 'Independência', '2026-10-12': 'N. Sra. Aparecida', '2026-11-02': 'Finados',
  '2026-11-15': 'Proclamação da República', '2026-11-20': 'Consciência Negra', '2026-12-25': 'Natal'
};

function ehFeriado(data) {
  return feriadosNacionais.hasOwnProperty(data);
}

function ehFimDeSemana(data) {
  const d = new Date(data + 'T12:00:00');
  const dia = d.getDay();
  return dia === 0 || dia === 6;
}

function getDiaSemana(data) {
  const d = new Date(data + 'T12:00:00');
  const dias = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
  return dias[d.getDay()];
}

function calcularDiariaAutomatica(data) {
  if (ehFeriado(data) || ehFimDeSemana(data)) {
    return 95.00;
  }
  return 80.00;
}

function atualizarInfoDiaria() {
  const dataSel = document.getElementById('data-selecionada').value;
  const valorAuto = calcularDiariaAutomatica(dataSel);
  const diaSemana = getDiaSemana(dataSel);
  const nomeFeriado = feriadosNacionais[dataSel];
  
  let texto = '';
  if (nomeFeriado) {
    texto = `📅 ${nomeFeriado} • Diária automática: R$ ${valorAuto.toFixed(2)}`;
  } else if (ehFimDeSemana(dataSel)) {
    texto = `📅 ${diaSemana} (Fim de Semana) • Diária automática: R$ ${valorAuto.toFixed(2)}`;
  } else {
    texto = `📅 ${diaSemana} (Terça-Sexta) • Diária automática: R$ ${valorAuto.toFixed(2)}`;
  }
  
  document.getElementById('diaria-info-auto').textContent = texto;
}

function verificarLogin() {
  const savedNome = localStorage.getItem('motoboy_nome');
  const savedTel = localStorage.getItem('motoboy_tel');
  const savedId = localStorage.getItem('motoboy_id');

  if (savedNome && savedTel && savedId) {
    motoboyInfo = { id: savedId, nome: savedNome, tel: savedTel };
    document.getElementById('nome-motoboy').textContent = savedNome;
    document.getElementById('modal-login').classList.add('hidden');
    document.getElementById('data-selecionada').value = dataAtual;
    atualizarInfoDiaria();
    carregarPedidosDaData();
  } else {
    document.getElementById('modal-login').classList.remove('hidden');
  }
}

function fazerLogin() {
  const nome = document.getElementById('login-nome').value.trim();
  const tel = document.getElementById('login-tel').value.trim();

  if (!nome || !tel) {
    alert('⚠️ Preencha nome e telefone!');
    return;
  }

  const id = 'MB_' + tel.replace(/\D/g, '');
  
  localStorage.setItem('motoboy_nome', nome);
  localStorage.setItem('motoboy_tel', tel);
  localStorage.setItem('motoboy_id', id);

  motoboyInfo = { id, nome, tel };
  document.getElementById('nome-motoboy').textContent = nome;
  document.getElementById('modal-login').classList.add('hidden');
  document.getElementById('data-selecionada').value = dataAtual;
  atualizarInfoDiaria();
  carregarPedidosDaData();
}

function calcularValor() {
  const km = parseFloat(document.getElementById('km').value) || 0;
  
  if (km <= 0) {
    document.getElementById('valor').value = '';
    return;
  }

  let valor = 0;
  for (let faixa of tabelaPrecos) {
    if (km <= faixa.ate) {
      valor = faixa.valor;
      break;
    }
  }

  document.getElementById('valor').value = valor.toFixed(2);
}

async function adicionarPedido() {
  const codigo = document.getElementById('codigo').value.trim();
  const plataforma = document.getElementById('plataforma').value;
  const endereco = document.getElementById('endereco').value.trim();
  const km = parseFloat(document.getElementById('km').value) || 0;
  const valor = parseFloat(document.getElementById('valor').value) || 0;
  const dataSel = document.getElementById('data-selecionada').value;

  if (!codigo || !plataforma || !endereco || valor <= 0) {
    alert('⚠️ Preencha todos os campos obrigatórios!');
    return;
  }

  const pedido = {
    codigo,
    plataforma,
    endereco,
    km,
    valor,
    motoboyId: motoboyInfo.id,
    motoboyNome: motoboyInfo.nome,
    data: dataSel,
    timestamp: new Date().toISOString()
  };

  try {
    await db.collection('pedidos').add(pedido);
    alert('✅ Pedido registrado!');
    limparFormPedido();
  } catch (error) {
    alert('❌ Erro: ' + error.message);
  }
}

async function adicionarDiaria() {
  const dataSel = document.getElementById('data-selecionada').value;
  let valorDiaria = parseFloat(document.getElementById('diaria-valor').value);
  
  if (!valorDiaria || valorDiaria <= 0) {
    valorDiaria = calcularDiariaAutomatica(dataSel);
  }

  const diaSemana = getDiaSemana(dataSel);
  const nomeFeriado = feriadosNacionais[dataSel];
  let descricao = `Diária - ${diaSemana}`;
  if (nomeFeriado) {
    descricao += ` (${nomeFeriado})`;
  }

  const diaria = {
    codigo: 'DIARIA-' + Date.now(),
    plataforma: 'Diária',
    endereco: descricao,
    km: 0,
    valor: valorDiaria,
    motoboyId: motoboyInfo.id,
    motoboyNome: motoboyInfo.nome,
    data: dataSel,
    timestamp: new Date().toISOString()
  };

  try {
    await db.collection('pedidos').add(diaria);
    alert('✅ Diária registrada: R$ ' + valorDiaria.toFixed(2));
    document.getElementById('diaria-valor').value = '';
  } catch (error) {
    alert('❌ Erro: ' + error.message);
  }
}

async function adicionarAdiantamento() {
  const valor = parseFloat(document.getElementById('adiant-valor').value) || 0;
  const descricao = document.getElementById('adiant-desc').value.trim();
  const dataSel = document.getElementById('data-selecionada').value;

  if (valor <= 0) {
    alert('⚠️ Informe um valor válido!');
    return;
  }

  if (!descricao) {
    alert('⚠️ Informe a descrição!');
    return;
  }

  const adiantamento = {
    codigo: 'ADI-' + Date.now(),
    plataforma: 'Adiantamento',
    endereco: descricao,
    km: 0,
    valor: -valor,
    motoboyId: motoboyInfo.id,
    motoboyNome: motoboyInfo.nome,
    data: dataSel,
    timestamp: new Date().toISOString()
  };

  try {
    await db.collection('pedidos').add(adiantamento);
    alert('✅ Adiantamento registrado!');
    limparFormAdiantamento();
  } catch (error) {
    alert('❌ Erro: ' + error.message);
  }
}

function carregarPedidosDaData() {
  const dataSel = document.getElementById('data-selecionada').value;
  atualizarInfoDiaria();
  
  db.collection('pedidos')
    .where('motoboyId', '==', motoboyInfo.id)
    .where('data', '==', dataSel)
    .onSnapshot(function(snapshot) {
      pedidos = [];
      snapshot.forEach(function(doc) {
        pedidos.push({ id: doc.id, ...doc.data() });
      });
      pedidos.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      atualizarLista();
    });
}

function limparFormPedido() {
  document.getElementById('codigo').value = '';
  document.getElementById('plataforma').value = '';
  document.getElementById('endereco').value = '';
  document.getElementById('km').value = '';
  document.getElementById('valor').value = '';
}

function limparFormAdiantamento() {
  document.getElementById('adiant-valor').value = '';
  document.getElementById('adiant-desc').value = '';
}

function atualizarLista() {
  const lista = document.getElementById('pedidos-list');
  const emptyState = document.getElementById('empty-state');
  const totalCard = document.getElementById('total-card');
  const acoesHoje = document.getElementById('acoes-hoje');

  if (pedidos.length === 0) {
    emptyState.classList.remove('hidden');
    lista.innerHTML = '';
    totalCard.classList.add('hidden');
    acoesHoje.classList.add('hidden');
    return;
  }

  emptyState.classList.add('hidden');
  totalCard.classList.remove('hidden');
  acoesHoje.classList.remove('hidden');

  let html = '';
  let total = 0;

  pedidos.forEach((p) => {
    const valorAbs = Math.abs(p.valor).toFixed(2).replace('.', ',');
    const sinal = p.valor < 0 ? '- R$' : 'R$';
    const negativo = p.valor < 0 ? 'negativo' : '';
    
    html += `
      <div class="pedido-item">
        <div class="pedido-info">
          <div class="pedido-codigo">#${p.codigo}</div>
          <div class="pedido-meta">
            ${p.plataforma} · ${p.endereco}${p.km > 0 ? ` · ${p.km} km` : ''}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="pedido-valor ${negativo}">${sinal} ${valorAbs}</div>
          <button class="btn-del" onclick="deletarPedido('${p.id}')" title="Excluir">🗑️</button>
        </div>
      </div>
    `;
    
    total += p.valor;
  });

  lista.innerHTML = html;
  document.getElementById('total-valor').textContent = 'R$ ' + total.toFixed(2).replace('.', ',');
}

async function deletarPedido(id) {
  if (!confirm('🗑️ Excluir este pedido?')) return;
  try {
    await db.collection('pedidos').doc(id).delete();
  } catch(e) { alert('❌ Erro ao excluir: ' + e.message); }
}

  pdf.text('Bolo de Mi',14,17);
  pdf.setFontSize(10); pdf.setFont('helvetica','normal'); pdf.setTextColor(249,168,212);
  pdf.text('Relatório de Entregas',14,26);
  pdf.setFontSize(8.5); pdf.setTextColor(210,190,230);
  pdf.text('Rua Asteca, 2812A - Santa Monica, Belo Horizonte - MG',14,33);
  pdf.setFontSize(8.5); pdf.setTextColor(255,255,255);
  pdf.text(dataFmt,W-14,26,{align:'right'});

  // Info motoboy
  pdf.setFillColor(238,228,248); pdf.roundedRect(14,46,W-28,22,4,4,'F');
  pdf.setFontSize(12); pdf.setFont('helvetica','bold'); pdf.setTextColor(...purple);
  pdf.text('Motoboy: '+motoboyInfo.nome,20,55);
  pdf.setFontSize(9); pdf.setFont('helvetica','normal'); pdf.setTextColor(...gray);
  if (motoboyInfo.tel) pdf.text('Telefone: '+motoboyInfo.tel,20,63);

  let curY = 76;

  // Corridas
  pdf.setFontSize(10); pdf.setFont('helvetica','bold'); pdf.setTextColor(...purple);
  pdf.text('🚴 Corridas',14,curY); curY+=4;
  pdf.autoTable({
    startY:curY,
    head:[['','Pedido','Plataforma','Endereço','KM','Valor']],
    body: corridas.length>0 ? corridas.map((p,i)=>[String(i+1),'#'+p.codigo,p.plataforma,p.endereco.length>40?p.endereco.substring(0,40)+'...':p.endereco,Number(p.km).toFixed(1)+' km','R$ '+Number(p.valor).toFixed(2).replace('.',',')]) : [['—','—','—','Nenhuma corrida','—','—']],
    theme:'grid',
    headStyles:{fillColor:purple,textColor:white,fontStyle:'bold',fontSize:8.5,halign:'center'},
    bodyStyles:{fontSize:8,textColor:[36,15,64]},
    alternateRowStyles:{fillColor:[253,244,251]},
    columnStyles:{0:{halign:'center',cellWidth:8},1:{halign:'center',cellWidth:22},2:{halign:'center',cellWidth:24},3:{cellWidth:82},4:{halign:'center',cellWidth:16},5:{halign:'right',cellWidth:26,fontStyle:'bold',textColor:green}},
    margin:{left:14,right:14}
  });
  curY = pdf.lastAutoTable.finalY+8;

  // Diária
  if (diarias.length>0) {
    pdf.setFontSize(10); pdf.setFont('helvetica','bold'); pdf.setTextColor(...purple);
    pdf.text('💵 Diária',14,curY); curY+=4;
    pdf.autoTable({startY:curY,head:[['Descrição','Valor']],body:diarias.map(p=>[p.endereco,'R$ '+Number(p.valor).toFixed(2).replace('.',',')]),theme:'grid',headStyles:{fillColor:[59,130,246],textColor:white,fontStyle:'bold',fontSize:8.5},bodyStyles:{fontSize:8.5,textColor:[36,15,64]},columnStyles:{0:{cellWidth:160},1:{halign:'right',cellWidth:18,fontStyle:'bold',textColor:green}},margin:{left:14,right:14}});
    curY = pdf.lastAutoTable.finalY+8;
  }

  // Adiantamentos
  if (adiantamentos.length>0) {
    pdf.setFontSize(10); pdf.setFont('helvetica','bold'); pdf.setTextColor(...purple);
    pdf.text('💸 Descontos / Adiantamentos',14,curY); curY+=4;
    pdf.autoTable({startY:curY,head:[['Descrição','Valor']],body:adiantamentos.map(p=>[p.endereco,'- R$ '+Math.abs(p.valor).toFixed(2).replace('.',',')]),theme:'grid',headStyles:{fillColor:red,textColor:white,fontStyle:'bold',fontSize:8.5},bodyStyles:{fontSize:8.5,textColor:[36,15,64]},columnStyles:{0:{cellWidth:160},1:{halign:'right',cellWidth:18,fontStyle:'bold',textColor:red}},margin:{left:14,right:14}});
    curY = pdf.lastAutoTable.finalY+8;
  }

  // Resumo
  const altR = 16+(diarias.length>0?9:0)+(adiantamentos.length>0?9:0)+22;
  pdf.setFillColor(238,228,248); pdf.roundedRect(14,curY,W-28,altR,5,5,'F');
  pdf.setFontSize(10); pdf.setFont('helvetica','bold'); pdf.setTextColor(...purple);
  pdf.text('Resumo',20,curY+10);
  let lx=20,rx=W-20,ly=curY+20;
  pdf.setFontSize(9);
  pdf.setFont('helvetica','normal'); pdf.setTextColor(...gray); pdf.text('Corridas ('+corridas.length+'):',lx,ly);
  pdf.setFont('helvetica','bold'); pdf.setTextColor(...green); pdf.text('R$ '+totalCorridas.toFixed(2).replace('.',','),rx,ly,{align:'right'}); ly+=9;
  if (diarias.length>0) { pdf.setFont('helvetica','normal'); pdf.setTextColor(...gray); pdf.text('Diária:',lx,ly); pdf.setFont('helvetica','bold'); pdf.setTextColor(59,130,246); pdf.text('R$ '+totalDiarias.toFixed(2).replace('.',','),rx,ly,{align:'right'}); ly+=9; }
  if (adiantamentos.length>0) { pdf.setFont('helvetica','normal'); pdf.setTextColor(...gray); pdf.text('Descontos:',lx,ly); pdf.setFont('helvetica','bold'); pdf.setTextColor(...red); pdf.text('- R$ '+Math.abs(totalAdiant).toFixed(2).replace('.',','),rx,ly,{align:'right'}); ly+=9; }
  pdf.setDrawColor(...pink); pdf.setLineWidth(0.5); pdf.line(20,ly,W-20,ly); ly+=3;
  pdf.setFillColor(...pink); pdf.roundedRect(14,ly,W-28,20,4,4,'F');
  pdf.setFont('helvetica','bold'); pdf.setFontSize(11); pdf.setTextColor(255,255,255);
  pdf.text('TOTAL DO DIA',lx,ly+13); pdf.setFontSize(15); pdf.text('R$ '+totalGeral.toFixed(2).replace('.',','),rx,ly+13,{align:'right'});
  const foot=ly+32;
  pdf.setFontSize(7.5); pdf.setFont('helvetica','normal'); pdf.setTextColor(...gray);
  pdf.text('Gerado pelo motoboy '+motoboyInfo.nome+' · Bolo de Mi',W/2,foot,{align:'center'});
  pdf.text('Emitido em: '+new Date().toLocaleString('pt-BR'),W/2,foot+5,{align:'center'});
  pdf.save('relatorio_'+motoboyInfo.nome.replace(/\s+/g,'_')+'_'+data+'.pdf');
}

function enviarWhatsAppHoje() {
  if (!pedidos || pedidos.length === 0) { alert('Nenhum pedido hoje.'); return; }
  const dataFmt = new Date(dataAtual+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
  const corridas      = pedidos.filter(p => p.plataforma!=='Diária' && p.plataforma!=='Adiantamento');
  const diarias       = pedidos.filter(p => p.plataforma==='Diária');
  const adiantamentos = pedidos.filter(p => p.plataforma==='Adiantamento');
  const total         = pedidos.reduce((s,p) => s+p.valor, 0);

  let msg = '🎂 *Bolo de Mi — Relatório*\n';
  msg += '📅 '+dataFmt+'\n';
  msg += '🛵 Motoboy: *'+motoboyInfo.nome+'*\n\n';
  if (corridas.length>0) {
    msg += '📦 *Corridas ('+corridas.length+')*\n';
    corridas.forEach((p,i) => { msg += (i+1)+'. #'+p.codigo+' — '+p.plataforma+' — R$ '+Number(p.valor).toFixed(2).replace('.',',')+'\n'; });
    msg += '\n';
  }
  if (diarias.length>0) {
    msg += '💵 *Diária*\n';
    diarias.forEach(p => { msg += p.endereco+' — R$ '+Number(p.valor).toFixed(2).replace('.',',')+'\n'; });
    msg += '\n';
  }
  if (adiantamentos.length>0) {
    msg += '💸 *Descontos*\n';
    adiantamentos.forEach(p => { msg += p.endereco+' — - R$ '+Math.abs(p.valor).toFixed(2).replace('.',',')+'\n'; });
    msg += '\n';
  }
  msg += '💰 *TOTAL: R$ '+total.toFixed(2).replace('.',',')+' *';
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}
